<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Link Shortener{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
{% block navbar %}
<nav class="navbar navbar-expand-lg navbar-light bg-light">
      <div class="container-fluid">
        <a class="navbar-brand" href="{% url 'index' %}">Link Shortener</a>
        <div class="d-flex ms-auto">
            <a class="btn btn-outline-success me-2" href="{% url 'stats' %}">
          Статистика
        </a>
          {% if request.user.is_authenticated %}
            <span class="navbar-text me-3">
              Привет, {{ request.user.username }}
            </span>
            <a class="btn btn-outline-danger" href="{% url 'user_logout' %}">Выйти</a>
          {% else %}
            <a class="btn btn-outline-primary" href="{% url 'user_login' %}">Войти</a>
          {% endif %}
        </div>
      </div>
    </nav>
{% endblock %}
    <div class="container mt-4">
        {% block content %}{% endblock %}
    </div>
<footer class="bg-light text-center py-3 mt-5">
    <p class="mb-0">© 2026 Link Shortener</p>
</footer>
</body>
</html>
